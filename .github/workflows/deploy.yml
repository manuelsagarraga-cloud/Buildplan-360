# Compila la app y la publica en GitHub Pages en cada push a main.
name: Deploy a GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build

      # ── Copiar parches al output ──────────────────────────────────────────
      # Agregar aquí una línea por cada nuevo parche que se incorpore.
      - name: Copiar parches al output
        run: |
          cp fix-cliente-v1.js       dist/assets/fix-cliente-v1.js
          cp campos-proyecto-v1.js   dist/assets/campos-proyecto-v1.js
          cp admin-listas-v1.js      dist/assets/admin-listas-v1.js

      # ── Copiar 404.html al output (fallback SPA) ─────────────────────────
      - name: Copiar 404.html al output
        run: cp 404.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
